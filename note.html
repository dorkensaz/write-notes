<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Write Notes</title>
<link rel="stylesheet" href="shared.css">
<style>
html, body { height: 100%; overflow: hidden; }
body { background: var(--surface); display: flex; flex-direction: column; }
header {
  display: flex;
  align-items: center;
  padding: 8px;
  gap: 4px;
}
header .grip { flex: 1; display: flex; align-items: center; padding: 0 8px; min-width: 0; }
header .grip .label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 16px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
main { flex: 1; display: flex; padding: 8px 16px; min-height: 0; }
#ta {
  flex: 1;
  width: 100%;
  max-width: 70ch;
  overflow-y: auto;
  outline: none;
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.5;
  color: var(--text);
  white-space: pre-wrap;
  word-wrap: break-word;
  user-select: text;
}
#ta:empty::before { content: attr(data-placeholder); color: var(--muted); }
/* the persistent bottom bar, in the spot Microsoft's Sticky Notes puts its own */
#toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  padding: 0 8px;
}
.fmtbtn {
  justify-content: center;
  padding: 0 10px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 16px;
  line-height: 1;
}
.fmtbtn.active { background: var(--steel); color: var(--base); }
#btn-bold { font-weight: 700; }
#btn-italic { font-style: italic; }
#btn-underline { text-decoration: underline; }
#btn-strike { text-decoration: line-through; }
footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 8px 16px;
}
footer .ts { font-family: 'IBM Plex Mono', monospace; font-size: 16px; color: var(--muted); }
#pin.on { background: var(--red); }
/* floating contextual toolbar: appears above a highlighted selection */
#floatbar {
  position: fixed;
  display: none;
  gap: 0;
  background: var(--navy);
  border-radius: 8px;
  padding: 8px;
  z-index: 45;
  box-shadow: 0 4px 16px rgba(0, 0, 0, .4);
}
#floatbar.show { display: flex; }
#defbox {
  position: fixed;
  inset: 48px 16px 48px 16px;
  background: var(--base);
  border-radius: 24px 16px 16px 16px;
  padding: 24px;
  overflow-y: auto;
  display: none;
  z-index: 40;
}
#defbox.show { display: block; }
#defbox h2 { font-size: 20px; color: var(--steel); display: flex; align-items: center; margin: 0 0 8px; }
#defbox p { margin: 0; white-space: pre-wrap; user-select: text; }
#defbox .close { float: right; background: var(--maroon); padding: 8px; margin: 0 0 8px 8px; }
</style>
</head>
<body>
<header class="dragbar">
  <div class="grip"><span class="sq sq-steel"></span><span class="label" id="tslabel"></span></div>
  <button class="iconbtn" id="btn-new" data-tip="Start a brand-new note right away, no need to open the hub."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg></button>
  <button class="iconbtn" id="btn-divider" data-tip="Drop a divider line where your cursor is. I copy it to your clipboard too."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="21" y1="12" y2="12"/><polyline points="8 8 12 4 16 8"/><polyline points="16 16 12 20 8 16"/></svg></button>
  <button class="iconbtn" id="btn-emdash" data-tip="Drop an em dash where your cursor is. I copy it to your clipboard too."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" x2="19" y1="12" y2="12"/></svg></button>
  <button class="iconbtn" id="btn-ice" data-tip="Stuck? I'll drop a random conversation starter into your note."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg></button>
  <button class="iconbtn" id="menubtn" data-tip="Open the Write Notes hub, with the full list of your notes."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
  <button class="iconbtn" id="pin" data-tip="Keep this note floating above every other app. Click again to let it sit normally."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg></button>
  <button class="iconbtn" id="btn-delete" data-tip="Delete this note for good. There's no undo, so I'm colored maroon as a warning." style="background:var(--maroon)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg></button>
  <button class="iconbtn" id="closebtn" data-tip="Tuck this note away. It's saved instantly, worry-free; bring it back anytime from the hub or the tray icon." style="background:var(--maroon);margin-left:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
</header>
<main>
  <div id="ta" contenteditable="true" data-placeholder="This one's blank. Type away." spellcheck="false"></div>
</main>
<div id="toolbar">
  <button class="iconbtn fmtbtn" id="btn-bold" data-tip="Bold your selection, or turn on bold for whatever you type next.">Bold</button>
  <button class="iconbtn fmtbtn" id="btn-italic" data-tip="Italicize your selection, or turn on italics for whatever you type next.">Italic</button>
  <button class="iconbtn fmtbtn" id="btn-underline" data-tip="Underline your selection, or turn on underline for whatever you type next.">Underline</button>
  <button class="iconbtn fmtbtn" id="btn-strike" data-tip="Strike through your selection, or turn it on for whatever you type next.">Strikethrough</button>
</div>
<footer>
  <span class="ts" data-tip="Drag any edge of the window to resize me.">&#8690;</span>
</footer>
<!-- appears above a highlighted selection, for the tools that need one -->
<div id="floatbar">
  <button class="iconbtn" id="f-upper" data-tip="Make the highlighted text ALL CAPS."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 15 4-8 4 8"/><path d="M4 13h6"/><path d="M15 11h4.5a2 2 0 0 1 0 4H15V7h4a2 2 0 0 1 0 4"/></svg></button>
  <button class="iconbtn" id="f-lower" data-tip="Make the highlighted text all lowercase."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="12" r="3"/><path d="M10 9v6"/><circle cx="17" cy="12" r="3"/><path d="M14 7v8"/></svg></button>
  <button class="iconbtn" id="f-define" data-tip="Look up the highlighted word in my built-in offline dictionary."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg></button>
  <button class="iconbtn" id="f-grammar" data-tip="Fix the grammar in the highlighted sentence."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 16 6-12 6 12"/><path d="M8 12h8"/><path d="m16 20 2 2 4-4"/></svg></button>
</div>
<div id="toast"></div>
<div id="defbox">
  <button class="close" id="defclose" data-tip="Close this definition and get back to writing."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
  <h2><span class="sq sq-steel"></span><span id="defword"></span></h2>
  <p id="deftext"></p>
</div>
<script src="tooltip.js"></script>
<script>
const EM = String.fromCharCode(0x2014);
const DIVIDER = '\n' + EM.repeat(3) + '\n';
const ICEBREAKERS = [
  "If you could have dinner with anyone alive today, who would it be?",
  "What is the best piece of advice you have ever received?",
  "What skill would you master instantly if you could?",
  "What is your go-to comfort food?",
  "If you won the lottery tomorrow, what is the first thing you would do?",
  "What is a small thing that made you smile this week?",
  "Coffee or tea, and how do you take it?",
  "What was your first job, and what did it teach you?",
  "If you could live in any city for a year, which one?",
  "What is a movie you can rewatch endlessly?",
  "What did you want to be when you were ten years old?",
  "What is the most beautiful place you have ever visited?",
  "If your life had a theme song, what would it be?",
  "What is one thing on your bucket list?",
  "What hobby would you pick up if time and money were no issue?",
  "What is the weirdest food combination you secretly enjoy?",
  "Are you a morning person or a night owl?",
  "What is a book that changed how you think?",
  "If you could instantly speak another language, which one?",
  "What is your favorite way to spend a rainy day?",
  "What is something you are looking forward to this month?",
  "If animals could talk, which would be the rudest?",
  "What is the best gift you have ever given someone?",
  "What is a talent you have that surprises people?",
  "Would you rather explore space or the deep ocean?",
  "What was your favorite subject in school?",
  "What is the last song you had stuck in your head?",
  "If you opened a small shop, what would it sell?",
  "What is a tradition from your family you love?",
  "What is the best meal you have ever eaten?",
  "If you could time travel, past or future?",
  "What is one app you could not live without?",
  "What is your idea of a perfect weekend?",
  "What fictional world would you most want to visit?",
  "What is something new you tried recently?",
  "If you had a free extra hour every day, how would you use it?",
  "What is the kindest thing a stranger has done for you?",
  "Which season fits your personality best?",
  "What is a smell that instantly brings back a memory?",
  "If you could swap lives with someone for a day, who?",
  "What is the most spontaneous thing you have ever done?",
  "What would the title of your autobiography be?",
  "If you could un-invent one thing, what would it be?",
  "What is your favorite word in any language?"
];

const id = Number(new URLSearchParams(location.search).get('id'));
const ta = document.getElementById('ta');
const toastEl = document.getElementById('toast');
const floatbar = document.getElementById('floatbar');
let lastIce = -1;

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastEl._t);
  toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 3200);
}

function fmtTs(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  const h24 = d.getHours();
  const h12 = h24 % 12 || 12;
  const ampm = h24 < 12 ? 'AM' : 'PM';
  return pad(d.getMonth() + 1) + '.' + pad(d.getDate()) + ', ' + h12 + ':' + pad(d.getMinutes()) + ' ' + ampm;
}

function touch() {
  api.setContent(id, ta.innerHTML);
  document.getElementById('tslabel').textContent = fmtTs(Date.now());
}

api.getNote(id).then(n => {
  if (!n) return;
  ta.innerHTML = n.html || '';
  document.getElementById('tslabel').textContent = fmtTs(n.ts);
  if (n.pin) document.getElementById('pin').classList.add('on');
});

ta.addEventListener('input', touch);
// keep the whole note one block of inline text + line breaks, no nested paragraphs to reason about
ta.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  document.execCommand('insertHTML', false, '<br>');
  padTrailingBreak();
  touch();
});

// a lone trailing <br> is invisible in Chromium (no blank line renders below it), so hitting
// Enter at the end of a note looks like it did nothing -- pad with a second <br> and park the
// caret in front of it so the new blank line actually shows up right away
function padTrailingBreak() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const end = document.createRange();
  end.selectNodeContents(ta);
  end.setStart(range.endContainer, range.endOffset);
  const frag = end.cloneContents();
  if (frag.textContent.length > 0 || frag.querySelectorAll('br').length > 0) return;
  const pad = document.createElement('br');
  range.insertNode(pad);
  range.setStartBefore(pad);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
}

function currentSelectionInEditor() {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return null;
  const range = sel.getRangeAt(0);
  if (!ta.contains(range.commonAncestorContainer) && range.commonAncestorContainer !== ta) return null;
  return { sel, range };
}

function transformSelection(fn) {
  const ctx = currentSelectionInEditor();
  if (!ctx) { toast("Highlight some text in the note first, then hit that button again."); return false; }
  const { range } = ctx;
  // a selection fully inside one text node has that node itself as commonAncestorContainer,
  // which has no descendants for a walker to find -- root at its parent element instead
  const root = range.commonAncestorContainer.nodeType === Node.TEXT_NODE
    ? range.commonAncestorContainer.parentNode
    : range.commonAncestorContainer;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = [];
  let node;
  while ((node = walker.nextNode())) { if (range.intersectsNode(node)) nodes.push(node); }
  nodes.forEach(node => {
    const start = node === range.startContainer ? range.startOffset : 0;
    const end = node === range.endContainer ? range.endOffset : node.data.length;
    if (start >= end) return;
    node.data = node.data.slice(0, start) + fn(node.data.slice(start, end)) + node.data.slice(end);
  });
  touch();
  return true;
}

function replaceSelectionText(text) {
  const ctx = currentSelectionInEditor();
  if (!ctx) return false;
  const { sel, range } = ctx;
  range.deleteContents();
  const node = document.createTextNode(text);
  range.insertNode(node);
  range.setStartAfter(node);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
  touch();
  return true;
}

function selectedPlainText() { return window.getSelection().toString(); }

// every button keeps the note's text selection alive across the click
document.querySelectorAll('button').forEach(b => b.addEventListener('mousedown', ev => ev.preventDefault()));

document.getElementById('pin').onclick = async () => {
  const on = !document.getElementById('pin').classList.contains('on');
  const applied = await api.setPin(id, on);
  document.getElementById('pin').classList.toggle('on', applied);
  toast(applied ? "Pinned. I'll float above everything until you unpin me." : "Unpinned. I'll behave like a normal window now.");
};
document.getElementById('btn-new').onclick = () => api.newNote();
document.getElementById('menubtn').onclick = () => api.openHub();
document.getElementById('closebtn').onclick = () => { touch(); api.closeNote(id); };
document.getElementById('btn-delete').onclick = () => api.deleteNote(id);

// persistent bottom bar: formatting toggles and inserts, matching where Microsoft's Sticky Notes puts them
const fmtButtons = { bold: document.getElementById('btn-bold'), italic: document.getElementById('btn-italic'), underline: document.getElementById('btn-underline'), strikeThrough: document.getElementById('btn-strike') };
Object.entries(fmtButtons).forEach(([cmd, btn]) => {
  btn.onclick = () => { ta.focus(); document.execCommand(cmd); touch(); };
});
function updateFormatStates() {
  Object.entries(fmtButtons).forEach(([cmd, btn]) => {
    try { btn.classList.toggle('active', document.queryCommandState(cmd)); } catch { /* no selection context yet */ }
  });
}

function copyClip(text) { navigator.clipboard.writeText(text).catch(() => {}); }
document.getElementById('btn-divider').onclick = () => {
  ta.focus();
  document.execCommand('insertHTML', false, '<br>');
  document.execCommand('insertText', false, EM.repeat(3));
  document.execCommand('insertHTML', false, '<br>');
  touch();
  copyClip(DIVIDER);
  toast("Divider's in, and I put a copy on your clipboard too.");
};
document.getElementById('btn-emdash').onclick = () => {
  ta.focus();
  document.execCommand('insertText', false, EM);
  touch();
  copyClip(EM);
  toast("Em dash dropped in, and it's on your clipboard if you need it elsewhere.");
};
document.getElementById('btn-ice').onclick = () => {
  ta.focus();
  let i;
  do { i = Math.floor(Math.random() * ICEBREAKERS.length); } while (i === lastIce);
  lastIce = i;
  if (ta.textContent.trim() !== '') document.execCommand('insertHTML', false, '<br>');
  document.execCommand('insertText', false, ICEBREAKERS[i]);
  touch();
};

// floating toolbar: only appears once text is highlighted, matching how Word/Notion do it
document.getElementById('f-upper').onclick = () => transformSelection(s => s.toUpperCase());
document.getElementById('f-lower').onclick = () => transformSelection(s => s.toLowerCase());

document.getElementById('f-define').onclick = async () => {
  const text = selectedPlainText();
  if (!text.trim()) { toast("Highlight some text in the note first, then hit that button again."); return; }
  const word = text.trim().split(/\s+/)[0];
  const r = await api.define(word);
  if (r.definition) {
    document.getElementById('defword').textContent = r.word;
    document.getElementById('deftext').textContent = r.definition;
    document.getElementById('defbox').classList.add('show');
    hideFloat();
  } else {
    toast('I looked, but "' + word + '" isn\'t in my dictionary. Mine is a classic Webster\'s, so very new words slip past it.');
  }
};
document.getElementById('defclose').onclick = () => document.getElementById('defbox').classList.remove('show');

document.getElementById('f-grammar').onclick = async () => {
  const text = selectedPlainText();
  if (!text.trim()) { toast("Highlight some text in the note first, then hit that button again."); return; }
  toast("Give me a second, I'm reading your sentence...");
  const r = await api.grammar(text);
  if (r.error) { toast("I couldn't reach a grammar checker just now. Once you're online (or the offline checker is running), try me again."); return; }
  replaceSelectionText(r.corrected);
  toast(r.corrected === text
    ? "That reads fine to me. I didn't change a thing."
    : "There you go, I tidied it up" + (r.source === 'local' ? ' with the offline checker.' : ' using the free online checker.'));
};

function hideFloat() { floatbar.classList.remove('show'); }
function positionFloat() {
  const ctx = currentSelectionInEditor();
  if (!ctx) { hideFloat(); return; }
  const rect = ctx.range.getBoundingClientRect();
  if (!rect || (rect.width === 0 && rect.height === 0)) { hideFloat(); return; }
  floatbar.classList.add('show');
  const bw = floatbar.offsetWidth, bh = floatbar.offsetHeight;
  let left = rect.left + rect.width / 2 - bw / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - bw - 8));
  let top = rect.top - bh - 8;
  if (top < 8) top = rect.bottom + 8;
  floatbar.style.left = left + 'px';
  floatbar.style.top = top + 'px';
}
let selTimer;
document.addEventListener('selectionchange', () => {
  clearTimeout(selTimer);
  selTimer = setTimeout(() => { positionFloat(); updateFormatStates(); }, 10);
});
</script>
</body>
</html>
